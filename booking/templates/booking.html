{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refúgio Plus - Agendar</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container fade-in">
        <header class="app-header">
            <button class="btn-icon" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <span class="header-title">Agendar um horário</span>
            <div style="width: 44px;"></div> <!-- Spacer for centering -->
        </header>

        <div class="date-selector">
            <span class="current-date" id="currentDateDisplay">Carregando...</span>
            <div class="calendar-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </div>
        </div>

        <div id="courtsContainer">
            <!-- Courts will be populated by JS -->
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Agendamento confirmado!</div>

    <script src="{% static 'js/script.js' %}"></script>
</body>

</html>
